<svg width="1200" height="820" viewBox="0 0 1200 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Horoscope App illustrated board</title>
  <desc id="desc">An illustrated board based on the product interface, with sign controls, a daily card, energy bars, and ritual extras.</desc>
  <defs>
    <linearGradient id="board" x1="120" y1="58" x2="1040" y2="750" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101A3C"/>
      <stop offset="1" stop-color="#171D47"/>
    </linearGradient>
    <linearGradient id="card" x1="260" y1="170" x2="780" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11182F"/>
      <stop offset="1" stop-color="#0A1022"/>
    </linearGradient>
    <linearGradient id="fillA" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#7CC7FF"/>
      <stop offset="1" stop-color="#D6B85B"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="820" rx="36" fill="#070B18"/>
  <rect x="58" y="58" width="1084" height="704" rx="34" fill="url(#board)" stroke="#EEF0FF" stroke-opacity="0.12"/>

  <g transform="translate(108 112)">
    <text x="0" y="26" fill="#F4DF8E" font-family="'Trebuchet MS', sans-serif" font-size="18" letter-spacing="5">CURRENT PRODUCT SURFACE</text>
    <text x="0" y="78" fill="#EEF0FF" font-family="Georgia, serif" font-size="48">A short reading flow with enough texture to stay interesting.</text>
  </g>

  <g transform="translate(108 190)">
    <rect x="0" y="0" width="224" height="70" rx="20" fill="#FFFFFF" fill-opacity="0.05" stroke="#EEF0FF" stroke-opacity="0.14"/>
    <text x="24" y="27" fill="#F4DF8E" font-family="'Trebuchet MS', sans-serif" font-size="14" letter-spacing="3">SIGN</text>
    <text x="24" y="50" fill="#EEF0FF" font-family="Georgia, serif" font-size="28">Aries</text>

    <rect x="246" y="0" width="224" height="70" rx="20" fill="#FFFFFF" fill-opacity="0.05" stroke="#EEF0FF" stroke-opacity="0.14"/>
    <text x="270" y="27" fill="#F4DF8E" font-family="'Trebuchet MS', sans-serif" font-size="14" letter-spacing="3">FOCUS</text>
    <text x="270" y="50" fill="#EEF0FF" font-family="Georgia, serif" font-size="28">Career</text>

    <rect x="492" y="0" width="224" height="70" rx="20" fill="#FFFFFF" fill-opacity="0.05" stroke="#EEF0FF" stroke-opacity="0.14"/>
    <text x="516" y="27" fill="#F4DF8E" font-family="'Trebuchet MS', sans-serif" font-size="14" letter-spacing="3">THEME</text>
    <text x="516" y="50" fill="#EEF0FF" font-family="Georgia, serif" font-size="28">Cosmic</text>

    <rect x="738" y="0" width="266" height="70" rx="20" fill="#FFFFFF" fill-opacity="0.05" stroke="#EEF0FF" stroke-opacity="0.14"/>
    <text x="762" y="27" fill="#F4DF8E" font-family="'Trebuchet MS', sans-serif" font-size="14" letter-spacing="3">SOURCE</text>
    <text x="762" y="50" fill="#EEF0FF" font-family="Georgia, serif" font-size="28">Secure proxy</text>
  </g>

  <g transform="translate(108 290)">
    <rect x="0" y="0" width="676" height="344" rx="30" fill="url(#card)" stroke="#EEF0FF" stroke-opacity="0.12"/>
    <text x="34" y="48" fill="#F4DF8E" font-family="'Trebuchet MS', sans-serif" font-size="14" letter-spacing="4">TODAY'S CARD</text>
    <text x="34" y="102" fill="#EEF0FF" font-family="Georgia, serif" font-size="54">Say less. Move quietly today.</text>
    <text x="34" y="148" fill="#C9CDEF" font-family="'Trebuchet MS', sans-serif" font-size="22">Theme of the day: Slow bloom.</text>
    <text x="34" y="212" fill="#C9CDEF" font-family="'Trebuchet MS', sans-serif" font-size="22">
      A small shift in perspective unlocks a smoother rhythm today.
    </text>
    <text x="34" y="244" fill="#C9CDEF" font-family="'Trebuchet MS', sans-serif" font-size="22">
      Keep your focus on one clear priority and let everything else
    </text>
    <text x="34" y="276" fill="#C9CDEF" font-family="'Trebuchet MS', sans-serif" font-size="22">
      become optional. A simple, kind message goes further than you think.
    </text>
    <rect x="34" y="300" width="120" height="4" rx="2" fill="#7CC7FF"/>
    <rect x="164" y="300" width="90" height="4" rx="2" fill="#D6B85B"/>
    <rect x="34" y="316" width="280" height="1" fill="#EEF0FF" fill-opacity="0.12"/>
  </g>

  <g transform="translate(810 290)">
    <rect x="0" y="0" width="282" height="158" rx="28" fill="#0A1022" fill-opacity="0.82" stroke="#EEF0FF" stroke-opacity="0.12"/>
    <text x="26" y="42" fill="#F4DF8E" font-family="'Trebuchet MS', sans-serif" font-size="14" letter-spacing="4">ENERGY</text>
    <text x="26" y="78" fill="#EEF0FF" font-family="Georgia, serif" font-size="26">Love</text>
    <rect x="100" y="65" width="150" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.08"/>
    <rect x="100" y="65" width="116" height="10" rx="5" fill="url(#fillA)"/>
    <text x="26" y="112" fill="#EEF0FF" font-family="Georgia, serif" font-size="26">Work</text>
    <rect x="100" y="99" width="150" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.08"/>
    <rect x="100" y="99" width="84" height="10" rx="5" fill="url(#fillA)"/>
    <text x="26" y="146" fill="#EEF0FF" font-family="Georgia, serif" font-size="26">Social</text>
    <rect x="100" y="133" width="150" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.08"/>
    <rect x="100" y="133" width="132" height="10" rx="5" fill="url(#fillA)"/>
  </g>

  <g transform="translate(810 472)">
    <rect x="0" y="0" width="282" height="162" rx="28" fill="#0A1022" fill-opacity="0.82" stroke="#EEF0FF" stroke-opacity="0.12"/>
    <text x="26" y="42" fill="#F4DF8E" font-family="'Trebuchet MS', sans-serif" font-size="14" letter-spacing="4">RITUAL EXTRAS</text>
    <text x="26" y="80" fill="#EEF0FF" font-family="Georgia, serif" font-size="26">Lucky color</text>
    <text x="180" y="80" fill="#C9CDEF" font-family="'Trebuchet MS', sans-serif" font-size="22">Amber</text>
    <text x="26" y="116" fill="#EEF0FF" font-family="Georgia, serif" font-size="26">Lucky number</text>
    <text x="188" y="116" fill="#C9CDEF" font-family="'Trebuchet MS', sans-serif" font-size="22">7</text>
    <text x="26" y="150" fill="#EEF0FF" font-family="Georgia, serif" font-size="26">Compatibility</text>
    <text x="196" y="150" fill="#C9CDEF" font-family="'Trebuchet MS', sans-serif" font-size="22">Playful</text>
  </g>

  <g transform="translate(108 658)" opacity="0.92">
    <text x="0" y="24" fill="#F4DF8E" font-family="'Trebuchet MS', sans-serif" font-size="14" letter-spacing="4">WHY IT MATTERS</text>
    <text x="0" y="62" fill="#C9CDEF" font-family="'Trebuchet MS', sans-serif" font-size="22">
      The repo already expresses a believable product rhythm: quick selection,
    </text>
    <text x="0" y="92" fill="#C9CDEF" font-family="'Trebuchet MS', sans-serif" font-size="22">
      short reading, mood shift, fallback path, and native packaging.
    </text>
  </g>
</svg>
