<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Products | Zach Alexander</title>
  <meta name="description" content="Products by Zach Alexander." />
  <style>
    :root {
      --bg: #f7f3eb;
      --card: #fffdf8;
      --text: #1a1b17;
      --muted: #55584f;
      --border: #e4dccd;
      --accent: #2f6b4a;
      --accent2: #9b7b49;
      --shadow: 0 14px 32px rgba(22, 20, 16, 0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101510;
        --card: #161d17;
        --text: #e9e6dc;
        --muted: #b6b3a8;
        --border: #2a352c;
        --accent: #88c09c;
        --accent2: #ccb07d;
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }
    main {
      max-width: 1060px;
      margin: 0 auto;
      padding: 24px 16px 52px;
    }
    .site-header {
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg) 92%, transparent);
    }
    .header-wrap {
      max-width: 1060px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }
    .brand-badge {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--text);
      color: var(--bg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
    }
    .nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.93rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 12px;
      background: var(--card);
    }
    .nav a[aria-current="page"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .hero {
      background:
        radial-gradient(circle at right top, color-mix(in srgb, var(--accent) 14%, transparent), transparent 45%),
        radial-gradient(circle at left bottom, color-mix(in srgb, var(--accent2) 14%, transparent), transparent 45%),
        var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 3.5vw, 2.4rem);
      line-height: 1.2;
    }
    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }
    p { color: var(--muted); }
    .grid {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-bottom: 1px solid var(--border);
      background: #efe7da;
    }
    .body {
      padding: 14px;
    }
    .body h2 {
      margin: 0 0 6px;
      font-size: 1.15rem;
    }
    .meta {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.94rem;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 12px;
      color: var(--text);
      font-size: 0.92rem;
    }
    .btn-primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .muted {
      color: var(--muted);
      font-size: 0.94rem;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-wrap">
      <a class="brand" href="/index.html">
        <span class="brand-badge">ZA</span>
        <span>Zach Alexander</span>
      </a>
      <nav class="nav" aria-label="Primary">
        <a href="/index.html">Home</a>
        <a href="/projects.html">Projects</a>
        <a href="/products/" aria-current="page">Products</a>
        <a href="/now.html">Now</a>
        <a href="/about.html">About</a>
        <a href="/contact.html">Contact</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="hero">
      <h1>Zach Alexander</h1>
      <p class="sub">Products</p>
      <p>Focused products designed to stay fast, practical, and easy to use in the real world.</p>
    </section>
    <section>
      <div id="products-grid" class="grid" aria-live="polite"></div>
      <p id="products-empty" class="muted" hidden>No products published yet.</p>
    </section>
  </main>
  <script defer src="/assets/js/products-catalog.js"></script>
</body>
</html>
