<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AIStoryTeller export cover</title>
  <desc id="desc">An illustrated cover showing a story sheet, a small atlas, a voice strip, and linked notes on a dark observatory background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1419"/>
      <stop offset="55%" stop-color="#0f1d24"/>
      <stop offset="100%" stop-color="#081015"/>
    </linearGradient>
    <radialGradient id="glowA" cx="20%" cy="18%" r="40%">
      <stop offset="0%" stop-color="#83c4ae" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#83c4ae" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="84%" cy="18%" r="34%">
      <stop offset="0%" stop-color="#f4b16c" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#f4b16c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#16252d"/>
      <stop offset="100%" stop-color="#101a21"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f2e6cc"/>
      <stop offset="100%" stop-color="#f4b16c"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowA)"/>
  <rect width="1600" height="900" fill="url(#glowB)"/>

  <g opacity="0.16" stroke="#f2e6cc" stroke-width="1">
    <path d="M0 140 H1600"/>
    <path d="M0 290 H1600"/>
    <path d="M0 440 H1600"/>
    <path d="M0 590 H1600"/>
    <path d="M0 740 H1600"/>
    <path d="M160 0 V900"/>
    <path d="M420 0 V900"/>
    <path d="M680 0 V900"/>
    <path d="M940 0 V900"/>
    <path d="M1200 0 V900"/>
    <path d="M1460 0 V900"/>
  </g>

  <g transform="translate(86 78)">
    <text x="0" y="24" fill="#f4b16c" font-size="18" font-family="Arial, Helvetica, sans-serif" letter-spacing="3">LOCAL STORY DESK</text>
    <text x="0" y="92" fill="#efe4ce" font-size="76" font-family="Georgia, 'Times New Roman', serif">AIStoryTeller</text>
    <text x="0" y="136" fill="#d0d1cb" font-size="25" font-family="Arial, Helvetica, sans-serif">Scenes, world state, voices, and image prompts in one browser-facing prototype.</text>
  </g>

  <g transform="translate(84 214)">
    <rect x="0" y="0" width="864" height="542" rx="32" fill="url(#card)" stroke="#f2e6cc" stroke-opacity="0.18"/>
    <rect x="36" y="38" width="792" height="248" rx="24" fill="#1b2f39" stroke="#f2e6cc" stroke-opacity="0.1"/>
    <text x="68" y="82" fill="#9eaba8" font-size="18" font-family="Arial, Helvetica, sans-serif" letter-spacing="2">SCENE</text>
    <rect x="68" y="118" width="640" height="16" rx="8" fill="url(#paper)"/>
    <rect x="68" y="154" width="702" height="14" rx="7" fill="#e8e0cf" opacity="0.76"/>
    <rect x="68" y="186" width="664" height="14" rx="7" fill="#e8e0cf" opacity="0.62"/>
    <rect x="68" y="218" width="566" height="14" rx="7" fill="#e8e0cf" opacity="0.48"/>

    <rect x="36" y="318" width="376" height="184" rx="24" fill="#13252d" stroke="#c4d8ff" stroke-opacity="0.16"/>
    <text x="68" y="356" fill="#9eaba8" font-size="18" font-family="Arial, Helvetica, sans-serif" letter-spacing="2">ATLAS</text>
    <path d="M112 404 L220 372 L326 430 L236 470 Z" fill="none" stroke="#b8cff7" stroke-width="3" opacity="0.78"/>
    <path d="M112 404 L236 470" fill="none" stroke="#b8cff7" stroke-width="2" opacity="0.46"/>
    <path d="M220 372 L326 430" fill="none" stroke="#b8cff7" stroke-width="2" opacity="0.46"/>
    <circle cx="112" cy="404" r="10" fill="#82c4ae"/>
    <circle cx="220" cy="372" r="10" fill="#82c4ae"/>
    <circle cx="326" cy="430" r="10" fill="#82c4ae"/>
    <circle cx="236" cy="470" r="10" fill="#82c4ae"/>

    <rect x="448" y="318" width="380" height="184" rx="24" fill="#13252d" stroke="#f4b16c" stroke-opacity="0.18"/>
    <text x="480" y="356" fill="#9eaba8" font-size="18" font-family="Arial, Helvetica, sans-serif" letter-spacing="2">VOICE</text>
    <g fill="url(#paper)">
      <rect x="494" y="430" width="28" height="28" rx="12"/>
      <rect x="542" y="390" width="28" height="68" rx="12"/>
      <rect x="590" y="414" width="28" height="44" rx="12"/>
      <rect x="638" y="370" width="28" height="88" rx="12"/>
      <rect x="686" y="402" width="28" height="56" rx="12"/>
      <rect x="734" y="382" width="28" height="76" rx="12"/>
      <rect x="782" y="420" width="28" height="38" rx="12"/>
    </g>
  </g>

  <g transform="translate(1010 264)">
    <rect x="0" y="0" width="504" height="412" rx="30" fill="#111c23" stroke="#f2e6cc" stroke-opacity="0.18"/>
    <text x="38" y="52" fill="#9eaba8" font-size="18" font-family="Arial, Helvetica, sans-serif" letter-spacing="2">FIELD NOTES</text>
    <text x="38" y="114" fill="#efe4ce" font-size="32" font-family="Georgia, 'Times New Roman', serif">Local browser UI</text>
    <text x="38" y="166" fill="#d0d1cb" font-size="24" font-family="Arial, Helvetica, sans-serif">World and map layer</text>
    <text x="38" y="218" fill="#d0d1cb" font-size="24" font-family="Arial, Helvetica, sans-serif">Optional memory path</text>
    <text x="38" y="270" fill="#d0d1cb" font-size="24" font-family="Arial, Helvetica, sans-serif">Optional voice path</text>
    <text x="38" y="322" fill="#d0d1cb" font-size="24" font-family="Arial, Helvetica, sans-serif">Optional image path</text>
    <rect x="38" y="350" width="188" height="18" rx="9" fill="#82c4ae" opacity="0.86"/>
    <rect x="244" y="350" width="122" height="18" rx="9" fill="#f4b16c" opacity="0.86"/>
  </g>
</svg>
