<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Word Search Atlas preview</title>
  <desc id="desc">An illustrated preview showing an atlas-like word grid, a travel route, and a globe marker.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8edd7" />
      <stop offset="55%" stop-color="#f3d5ae" />
      <stop offset="100%" stop-color="#ef9c73" />
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8dc9ff" />
      <stop offset="100%" stop-color="#2f78c4" />
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffaf1" />
      <stop offset="100%" stop-color="#f4e7cf" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#2c3850" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)" />
  <circle cx="155" cy="130" r="180" fill="#ffffff" opacity="0.16" />
  <circle cx="1020" cy="94" r="132" fill="#ffffff" opacity="0.14" />
  <circle cx="976" cy="540" r="168" fill="#ffffff" opacity="0.09" />

  <path
    d="M110 468 C250 342 408 458 538 372 C642 304 744 172 918 204 C1008 222 1070 292 1090 372"
    fill="none"
    stroke="#17344f"
    stroke-opacity="0.26"
    stroke-width="6"
    stroke-dasharray="12 14"
    stroke-linecap="round"
  />
  <circle cx="112" cy="468" r="10" fill="#17344f" fill-opacity="0.45" />
  <circle cx="590" cy="348" r="10" fill="#17344f" fill-opacity="0.45" />
  <circle cx="1090" cy="372" r="10" fill="#17344f" fill-opacity="0.45" />

  <g filter="url(#shadow)">
    <rect x="78" y="92" width="552" height="430" rx="36" fill="url(#paper)" />
    <rect x="116" y="138" width="476" height="276" rx="24" fill="#fffef9" stroke="#d7c4a2" stroke-width="2" />
    <g fill="#22324a">
